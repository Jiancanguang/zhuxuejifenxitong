<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>班级宠物屋</title>
  </head>
  <body class="bg-paper min-h-screen">
    <div id="root"></div>
    <script>
      (() => {
        const cleanupMarkerKey = 'bjcwy-restored-token-reset-v1';
        if (window.localStorage.getItem(cleanupMarkerKey) === 'done') {
          return;
        }

        window.localStorage.removeItem('class-pet-garden-token');
        window.localStorage.removeItem('class-pet-garden-admin-token');
        window.localStorage.setItem(cleanupMarkerKey, 'done');
      })();
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
